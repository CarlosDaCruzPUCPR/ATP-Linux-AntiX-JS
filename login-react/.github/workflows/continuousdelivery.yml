name: Continuous Delivery

on:
  push:
    branches:
      - main

jobs:

  deliver:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Simulacao continuous delivery
        uses: actions/upload-artifact@v4
        with:
          name: projeto-build
          path: build/


  deploy:
    runs-on: ubuntu-latest
    needs: deliver

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Display structure of files
        run: ls -R


  docker:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3